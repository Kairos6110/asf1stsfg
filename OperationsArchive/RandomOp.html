<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Operation</title>
<style>
    :root {
        color-scheme: dark;
        --bg-1: #07111a;
        --bg-2: #0d1f2e;
        --panel: rgba(11, 21, 31, 0.88);
        --panel-border: rgba(131, 153, 176, 0.2);
        --text: #f3f7fb;
        --muted: #93a4b6;
        --accent: #7dd3fc;
        --accent-strong: #38bdf8;
        --button-text: #03131e;
        --shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
    }

    * {
        box-sizing: border-box;
    }

    html,
    body {
        min-height: 100%;
        margin: 0;
    }

    body {
        font-family: Arial, sans-serif;
        color: var(--text);
        background:
            radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 35%),
            linear-gradient(180deg, var(--bg-2), var(--bg-1) 58%);
    }

    main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
    }

    .card {
        width: min(100%, 720px);
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 24px;
        padding: 24px 18px;
        text-align: center;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
    }

    .eyebrow {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 0.8rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
    }

    .operation-name {
        display: inline-block;
        margin: 0;
        color: var(--text);
        text-decoration: none;
        font-size: clamp(2rem, 8vw, 4.6rem);
        font-weight: 700;
        line-height: 1.02;
        overflow-wrap: anywhere;
    }

    .operation-name:hover,
    .operation-name:focus-visible {
        color: var(--accent);
    }

    .hint {
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.5;
    }

    .actions {
        display: grid;
        gap: 12px;
        margin-top: 24px;
    }

    button {
        width: 100%;
        border: 0;
        border-radius: 14px;
        padding: 15px 18px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.15s ease, opacity 0.15s ease, background-color 0.15s ease;
    }

    button:hover,
    button:focus-visible {
        transform: translateY(-1px);
    }

    .copy-button {
        background: var(--accent);
        color: var(--button-text);
    }

    .reroll-button {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--panel-border);
    }

    .status {
        min-height: 1.4em;
        margin: 14px 0 0;
        color: var(--accent);
        font-size: 0.92rem;
    }

    @media (min-width: 768px) {
        .card {
            padding: 36px 32px;
        }

        .actions {
            grid-template-columns: 1fr 1fr;
        }
    }
</style>
</head>
<body>
<main>
    <section class="card" aria-labelledby="operationName">
        <p class="eyebrow">Random Operation</p>
        <a id="operationName" class="operation-name" href="#" target="_blank" rel="noopener noreferrer">Loading...</a>
        <p class="hint">Copy the link, share it with teammates on the Discord.</p>
        <div class="actions">
            <button id="copyButton" class="copy-button" type="button">Copy Briefing Link</button>
            <button id="rerollButton" class="reroll-button" type="button">Pick Another</button>
        </div>
        <p id="status" class="status" aria-live="polite"></p>
    </section>
</main>

    const operationName = document.getElementById("operationName");
    const copyButton = document.getElementById("copyButton");
    const rerollButton = document.getElementById("rerollButton");
    const status = document.getElementById("status");

    let currentOperation = null;

    function pickRandomOperation() {
        if (!operations.length) {
            operationName.textContent = "No operations found";
            operationName.removeAttribute("href");
            copyButton.disabled = true;
            rerollButton.disabled = true;
            status.textContent = "The operation list is empty.";
            return;
        }

        currentOperation = operations[Math.floor(Math.random() * operations.length)];
        operationName.textContent = currentOperation.name;
        operationName.href = currentOperation.url;
        status.textContent = "";
    }

    async function copyCurrentOperationLink() {
        if (!currentOperation) {
            return;
        }

        try {
            await navigator.clipboard.writeText(currentOperation.url);
            status.textContent = "Link copied.";
        } catch (error) {
            const tempInput = document.createElement("input");
            tempInput.value = currentOperation.url;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            status.textContent = "Link copied.";
        }
    }

    copyButton.addEventListener("click", copyCurrentOperationLink);
    rerollButton.addEventListener("click", pickRandomOperation);

    pickRandomOperation();
</script>
